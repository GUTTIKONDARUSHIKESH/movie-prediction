<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar | Box Office Predictor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="mesh-bg"></div>

    <div class="container">
        <header class="header">
            <h1 class="logo">Stellar<span class="dot">.</span></h1>
            <p class="subtitle">AI-Powered Box Office Earnings Prediction</p>
        </header>

        <main class="glass-panel">
            <form id="prediction-form" class="form-grid">
                
                <div class="input-group">
                    <label for="budget">Production Budget ($)</label>
                    <input type="number" id="budget" name="budget" value="25000000" min="0" required>
                    <div class="focus-ring"></div>
                </div>

                <div class="input-group">
                    <label for="runtime">Runtime (Minutes)</label>
                    <input type="number" id="runtime" name="runtime" value="115" min="1" required>
                    <div class="focus-ring"></div>
                </div>

                <div class="input-group">
                    <label for="votes">Expected IMDB Votes</label>
                    <input type="number" id="votes" name="votes" value="150000" min="0" required>
                    <div class="focus-ring"></div>
                </div>

                <div class="input-group">
                    <label for="score">Expected Score (1.0 - 10.0)</label>
                    <input type="number" id="score" name="score" value="7.2" min="1.0" max="10.0" step="0.1" required>
                    <div class="focus-ring"></div>
                </div>

                <div class="input-group full-width">
                    <label for="genre">Genre</label>
                    <select id="genre" name="genre" required>
                        <option value="" disabled selected>Select a Genre</option>
                        <!-- Populated via JS -->
                    </select>
                    <div class="focus-ring"></div>
                </div>

                <div class="input-group full-width">
                    <label for="star">Lead Cast / Star</label>
                    <select id="star" name="star" required>
                        <option value="" disabled selected>Select Lead Star</option>
                        <!-- Populated via JS -->
                    </select>
                    <div class="focus-ring"></div>
                </div>

                <div class="actions full-width">
                    <button type="submit" class="btn-predict" id="predict-btn">
                        <span class="btn-text">Predict Earnings</span>
                        <div class="spinner hide"></div>
                    </button>
                </div>
            </form>

            <div class="result-container hide" id="result-box">
                <p class="result-label">Predicted Gross Revenue</p>
                <h2 class="result-value" id="result-val">$0.00</h2>
                <div class="result-badge" id="result-badge">Hit Status</div>
            </div>
        </main>
    </div>

    <!-- Optional micro-animations library JS or purely custom (we use custom CSS for simplicity) -->
    <script src="/static/script.js"></script>
</body>
</html>
